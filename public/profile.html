<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Мой профиль | SteamFall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .profile-wrapper {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      animation: fadeInUp 0.4s ease;
    }
    .profile-card {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: var(--radius-2xl);
      padding: 32px;
      border: 1px solid var(--color-border);
      margin-bottom: 30px;
    }
    .profile-header {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      align-items: center;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #a78bfa;
      object-fit: cover;
    }
    .profile-info h2 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .profile-info p {
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }
    .profile-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .stat-box {
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius-xl);
      padding: 16px;
      text-align: center;
    }
    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: #a78bfa;
    }
    .section-title {
      font-size: 1.4rem;
      margin: 30px 0 20px;
      border-left: 4px solid #a78bfa;
      padding-left: 16px;
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .game-card {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: 0.2s;
      border: 1px solid var(--color-border);
    }
    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--color-accent);
    }
    .game-card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
    }
    .game-card .info {
      padding: 12px;
      text-align: center;
    }
    .game-card a {
      color: var(--color-text-primary);
      text-decoration: none;
      font-weight: 500;
    }
    .empty-message {
      text-align: center;
      padding: 40px;
      color: var(--color-text-muted);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #a78bfa;
      padding: 8px 20px;
      border-radius: 40px;
      color: #a78bfa;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: var(--gradient-accent);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <div class="logo"><i class="fas fa-dragon"></i> Steam<span style="background: linear-gradient(135deg, #a78bfa, #6366f1); background-clip: text; -webkit-background-clip: text; color: transparent;">Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
      <a href="/faq.html">FAQ</a>
    </div>
    <div class="auth-buttons" id="authButtons"></div>
  </div>
</header>

<main class="container">
  <div class="profile-wrapper" id="profileContent">
    <div style="text-align: center; padding: 60px;">Загрузка профиля...</div>
  </div>
</main>

<footer>
  <div class="container">
    <p>© 2025 SteamFall — торрент-трекер игр. Ваш личный кабинет.</p>
  </div>
</footer>

<div id="toast" class="toast"></div>

<script>
  (function() {
    const token = localStorage.getItem('token');
    const toast = document.getElementById('toast');
    const profileContent = document.getElementById('profileContent');

    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.style.color = isError ? '#ef4444' : '#a78bfa';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    if (!token) {
      profileContent.innerHTML = '<div class="profile-card" style="text-align:center;"><p>Вы не авторизованы. <a href="/login.html" class="btn-outline">Войти</a></p></div>';
      return;
    }

    async function fetchUserData() {
      try {
        const res = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Сессия истекла');
        return await res.json();
      } catch (err) {
        localStorage.removeItem('token');
        showToast('Авторизация истекла, войдите снова', true);
        setTimeout(() => window.location.href = '/login.html', 1500);
        return null;
      }
    }

    async function fetchFavorites() {
      try {
        const res = await fetch('/api/favorites', { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) return await res.json();
        return [];
      } catch (err) { return []; }
    }

    async function fetchGameDetails(gameId) {
      try {
        const res = await fetch(`/api/games/${gameId}`);
        if (res.ok) return await res.json();
        return null;
      } catch (err) { return null; }
    }

    async function loadProfile() {
      const user = await fetchUserData();
      if (!user) return;

      const favorites = await fetchFavorites();
      let favoriteGames = [];
      for (const fav of favorites) {
        const game = await fetchGameDetails(fav.gameId);
        if (game) favoriteGames.push(game);
      }

      profileContent.innerHTML = `
        <div class="profile-card">
          <div class="profile-header">
            <img class="avatar" src="${user.avatar || 'https://i.pravatar.cc/100'}" alt="avatar">
            <div class="profile-info">
              <h2>${escapeHtml(user.username)}</h2>
              <p><i class="fas fa-envelope"></i> ${escapeHtml(user.email)}</p>
              <p><i class="fas fa-user-tag"></i> Роль: ${user.role === 'admin' ? 'Администратор' : 'Пользователь'}</p>
              <p><i class="fas fa-calendar-alt"></i> На сайте с: ${new Date(user.createdAt).toLocaleDateString('ru-RU')}</p>
            </div>
          </div>
          <div class="profile-stats">
            <div class="stat-box"><div class="stat-number">${favorites.length}</div><div>В избранном</div></div>
            <div class="stat-box"><div class="stat-number">—</div><div>Скачиваний</div></div>
            <div class="stat-box"><div class="stat-number">—</div><div>Комментариев</div></div>
          </div>
          <div style="display: flex; gap: 16px; justify-content: center; margin-top: 20px;">
            <button id="logoutProfileBtn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> Выйти</button>
            <a href="/" class="btn-primary">На главную</a>
          </div>
        </div>

        <div class="section-title"><i class="fas fa-heart"></i> Избранные игры</div>
        <div class="games-grid" id="favoritesGrid">
          ${favoriteGames.length ? favoriteGames.map(game => `
            <div class="game-card">
              <img src="${game.screenshots?.[0] || 'https://picsum.photos/id/0/300/130'}" alt="${escapeHtml(game.title)}">
              <div class="info">
                <a href="/game.html?id=${game.id}">${escapeHtml(game.title)}</a>
                <div style="font-size:0.8rem; color: var(--color-text-muted);">⭐ ${game.rating || '—'}</div>
              </div>
            </div>
          `).join('') : '<div class="empty-message">Нет игр в избранном. Добавьте их на главной или на странице игры.</div>'}
        </div>
      `;

      document.getElementById('logoutProfileBtn')?.addEventListener('click', () => {
        localStorage.removeItem('token');
        showToast('Вы вышли из аккаунта');
        setTimeout(() => window.location.href = '/', 1000);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    loadProfile();
  })();

  window.addEventListener('scroll', function() {
    const header = document.getElementById('header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });
</script>
</body>
</html>
