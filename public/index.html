<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamFall — торрент игры в стиле glassmorphism</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="glass-bg"></div>
<header class="header">
  <div class="container">
    <div class="logo"><i class="fas fa-skull"></i> SteamFall</div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
      <a href="/faq.html">FAQ</a>
    </div>
    <div class="auth-buttons" id="authButtons">
      <a href="/login.html" class="btn-outline">Войти</a>
      <a href="/login.html?register=1" class="btn-primary">Регистрация</a>
    </div>
  </div>
</header>
<main class="container">
  <div style="margin: 40px 0;">
    <div class="search-filters" style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
      <input type="text" id="searchInput" placeholder="Поиск игры..." style="flex:1; min-width:200px; background:rgba(22,26,35,0.7); border:1px solid rgba(255,255,255,0.08); border-radius:60px; padding:12px 20px; color:white;">
      <select id="genreFilter" style="background:rgba(22,26,35,0.7); border:1px solid rgba(255,255,255,0.08); border-radius:60px; padding:12px 20px; color:white;">
        <option value="all">Все жанры</option>
        <option value="RPG">RPG</option>
        <option value="Action">Action</option>
        <option value="Indie">Indie</option>
      </select>
      <select id="sortSelect" style="background:rgba(22,26,35,0.7); border:1px solid rgba(255,255,255,0.08); border-radius:60px; padding:12px 20px; color:white;">
        <option value="date">Новые</option>
        <option value="downloads">Популярные</option>
        <option value="rating">По рейтингу</option>
      </select>
    </div>
  </div>
  <div class="games-layout">
    <aside class="sidebar">
      <div class="widget">
        <h3>Популярные игры</h3>
        <ul class="popular-list" id="popularList"><li>Загрузка...</li></ul>
      </div>
    </aside>
    <div class="games-grid" id="gamesGrid">
      <div class="skeleton-card" style="background:rgba(22,26,35,0.5); border-radius:20px; height:340px;"></div>
      <div class="skeleton-card" style="background:rgba(22,26,35,0.5); border-radius:20px; height:340px;"></div>
      <div class="skeleton-card" style="background:rgba(22,26,35,0.5); border-radius:20px; height:340px;"></div>
    </div>
  </div>
  <div id="pagination" class="pagination"></div>
</main>
<footer>
  <div class="container"><p>© 2025 SteamFall — торрент-трекер игр</p></div>
</footer>
<div id="toast" class="toast"></div>
<script src="/js/main.js"></script>
</body>
</html>
