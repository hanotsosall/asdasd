<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SteamFall — страница игры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      line-height: 1.5;
      overflow-x: hidden;
    }
    /* Анимированный фон */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #0f172a, #020617);
    }
    .animated-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
      animation: rotateBg 25s linear infinite;
    }
    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }
    /* Хедер (как на главной) */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 12, 16, 0.6);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59,130,246,0.2);
      transition: all 0.3s;
    }
    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 6s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #3b82f6;
      padding: 8px 20px;
      border-radius: 40px;
      color: #3b82f6;
      font-weight: 600;
      cursor: pointer;
    }
    /* Основное содержание */
    .game-detail {
      margin: 40px 0;
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .game-header {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 30px;
      border: 1px solid rgba(59,130,246,0.2);
      margin-bottom: 40px;
    }
    .game-cover {
      flex: 1;
      min-width: 250px;
    }
    .game-cover img {
      width: 100%;
      border-radius: 24px;
      transition: transform 0.3s;
    }
    .game-cover img:hover {
      transform: scale(1.02);
    }
    .game-info {
      flex: 2;
    }
    .game-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    .game-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .game-meta span {
      background: rgba(59,130,246,0.2);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
    }
    .game-description {
      line-height: 1.6;
      margin: 20px 0;
    }
    .game-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 24px;
      margin: 20px 0;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #3b82f6;
    }
    .game-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .download-btn {
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .download-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px #3b82f6;
    }
    .favorite-btn {
      background: rgba(255,105,180,0.2);
      border: 1px solid #f472b6;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      color: #f472b6;
      cursor: pointer;
    }
    .favorite-btn.active {
      background: #f472b6;
      color: white;
    }
    /* Скриншоты */
    .screenshots-section {
      margin: 40px 0;
    }
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .screenshot-item {
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }
    .screenshot-item img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      transition: 0.3s;
    }
    .screenshot-item:hover img {
      transform: scale(1.05);
    }
    /* Чат */
    .chat-section {
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 24px;
      margin: 40px 0;
    }
    .chat-messages {
      height: 300px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 16px;
      margin: 16px 0;
    }
    .chat-message {
      margin-bottom: 12px;
      padding: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .chat-input-area {
      display: flex;
      gap: 12px;
    }
    .chat-input-area input {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border: 1px solid #1e293b;
      padding: 12px;
      border-radius: 60px;
      color: white;
    }
    /* Отзывы */
    .reviews-section {
      margin: 40px 0;
    }
    .review-card {
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .review-author img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .review-rating {
      color: #fbbf24;
      letter-spacing: 2px;
    }
    .like-btn {
      background: none;
      border: none;
      color: #3b82f6;
      cursor: pointer;
      margin-left: 16px;
    }
    .comments-toggle {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      margin-left: 16px;
    }
    .comments-section {
      margin-top: 16px;
      padding-left: 20px;
      border-left: 2px solid #3b82f6;
      display: none;
    }
    .comment {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 16px;
      margin: 8px 0;
    }
    .add-review-form {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 24px;
      margin-top: 30px;
    }
    .add-review-form select, .add-review-form textarea {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid #1e293b;
      border-radius: 20px;
      padding: 12px;
      color: white;
      margin: 8px 0;
    }
    /* Похожие игры */
    .similar-games {
      margin: 40px 0;
    }
    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .similar-card {
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      overflow: hidden;
      transition: 0.2s;
    }
    .similar-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .similar-card .info {
      padding: 12px;
      text-align: center;
    }
    .similar-card a {
      color: #60a5fa;
      text-decoration: none;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #3b82f6;
      padding: 12px 28px;
      border-radius: 60px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #1e293b;
      margin-top: 50px;
    }
    @media (max-width: 700px) {
      .game-header { flex-direction: column; }
      .game-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="animated-bg"></div>
<header class="header">
  <div class="container">
    <div class="logo"><i class="fas fa-skull"></i> Steam<span>Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
    </div>
    <div class="auth-buttons">
      <a href="/login.html" class="btn-outline">Войти</a>
    </div>
  </div>
</header>
<main class="container" id="gameContainer">
  <div class="game-detail">Загрузка...</div>
</main>
<footer>
  <div class="container"><p>© 2025 SteamFall — анимированный торрент-трекер</p></div>
</footer>
<div id="toast" class="toast"></div>
<script src="/js/game.js"></script>
</body>
</html>
