<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Подробная информация об игре, скриншоты, отзывы игроков, magnet-ссылка на торрент. SteamFall ULTIMATE">
  <title>SteamFall – Детали игры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    /* дополнительные стили специально для страницы игры */
    .game-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .game-header {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 50px;
      background: linear-gradient(145deg, #0F1219, #0A0D14);
      border-radius: 32px;
      padding: 30px;
      border: 1px solid rgba(0,229,255,0.2);
    }
    .game-cover {
      flex: 1;
      min-width: 250px;
    }
    .game-cover img {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
    }
    .game-info {
      flex: 2;
    }
    .game-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #00E5FF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    .game-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .game-meta span {
      background: #1E293B;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.85rem;
    }
    .game-description {
      line-height: 1.6;
      margin: 20px 0;
      color: #CBD5E1;
    }
    .game-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
      background: #0A0E16;
      padding: 20px;
      border-radius: 28px;
      margin: 20px 0;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #00E5FF;
    }
    .game-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .btn-magnet {
      background: linear-gradient(90deg, #00E5FF, #007BFF);
      border: none;
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-magnet:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px #00E5FF;
    }
    .btn-favorite {
      background: rgba(255,105,180,0.2);
      border: 1px solid #FF69B4;
      padding: 14px 32px;
      border-radius: 60px;
      font-weight: 700;
      color: #FF69B4;
      cursor: pointer;
    }
    .btn-favorite.active {
      background: #FF69B4;
      color: white;
    }
    .screenshots-section {
      margin: 40px 0;
    }
    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .screenshot-item {
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }
    .screenshot-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      transition: 0.3s;
    }
    .screenshot-item:hover img {
      transform: scale(1.05);
    }
    .chat-section {
      background: #0A0E16;
      border-radius: 32px;
      padding: 24px;
      margin: 40px 0;
    }
    .chat-messages {
      height: 300px;
      overflow-y: auto;
      background: #0F1219;
      border-radius: 20px;
      padding: 16px;
      margin: 16px 0;
    }
    .chat-message {
      margin-bottom: 12px;
      padding: 8px;
      border-bottom: 1px solid #1E2A3A;
    }
    .chat-message strong {
      color: #00E5FF;
    }
    .chat-input-area {
      display: flex;
      gap: 12px;
    }
    .chat-input-area input {
      flex: 1;
      background: #1F2A3A;
      border: none;
      padding: 14px;
      border-radius: 60px;
      color: white;
    }
    .reviews-section {
      margin: 40px 0;
    }
    .review-card {
      background: #11161F;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .review-author img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }
    .review-rating {
      color: #FFD166;
      letter-spacing: 2px;
    }
    .review-text {
      margin: 12px 0;
      line-height: 1.5;
    }
    .review-footer {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .like-btn {
      background: none;
      border: none;
      color: #00E5FF;
      cursor: pointer;
    }
    .comments-toggle {
      background: none;
      border: none;
      color: #94A3B8;
      cursor: pointer;
    }
    .comments-section {
      margin-top: 16px;
      padding-left: 20px;
      border-left: 2px solid #2C3E50;
      display: none;
    }
    .comment {
      background: #0A0E16;
      padding: 10px;
      border-radius: 16px;
      margin: 8px 0;
    }
    .add-comment {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .add-comment input {
      flex: 1;
      background: #1F2A3A;
      border: none;
      padding: 10px;
      border-radius: 40px;
      color: white;
    }
    .similar-games {
      margin: 40px 0;
    }
    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .similar-card {
      background: #0F1219;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.2s;
    }
    .similar-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .similar-card .info {
      padding: 12px;
    }
    .similar-card a {
      color: #00E5FF;
      text-decoration: none;
      font-weight: 600;
    }
    .loading-spinner {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
    }
    @media (max-width: 700px) {
      .game-header { flex-direction: column; }
      .game-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo"><i class="fas fa-skull"></i> Steam<span>Fall</span></div>
      <div class="header-actions" id="headerActions"></div>
    </div>
  </header>

  <main class="game-container" id="gameContainer">
    <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Загрузка игры...</div>
  </main>

  <footer>
    <div class="container">
      <p>© 2025 SteamFall — торрент-трекер №1</p>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="/js/game.js"></script>
</body>
</html>
