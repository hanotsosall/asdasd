<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Подробная информация об игре: описание, системные требования, скриншоты, отзывы, magnet-ссылка.">
  <title>SteamFall — страница игры</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <div class="logo"><i class="fas fa-dragon"></i> Steam<span style="background: linear-gradient(135deg, #a78bfa, #6366f1); background-clip: text; -webkit-background-clip: text; color: transparent;">Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
      <a href="/faq.html">FAQ</a>
    </div>
    <div class="auth-buttons" id="authButtons">
      <a href="/login.html" class="btn-outline">Войти</a>
      <a href="/login.html?register=1" class="btn-primary">Регистрация</a>
    </div>
  </div>
</header>

<main class="container" id="gameContainer">
  <div style="text-align: center; padding: 60px;" class="loading-skeleton">Загрузка данных об игре...</div>
</main>

<footer>
  <div class="container">
    <p>© 2025 SteamFall — торрент-трекер игр</p>
  </div>
</footer>

<div id="toast" class="toast"></div>

<script src="/js/game.js"></script>
<script>
  // Анимация хедера при скролле
  window.addEventListener('scroll', function() {
    const header = document.getElementById('header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });
</script>
</body>
</html>
