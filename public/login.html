<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | SteamFall ULTIMATE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0a0f1a, #020408);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }
    .auth-container {
      max-width: 460px;
      width: 100%;
      background: linear-gradient(145deg, #0F1219, #0A0D14);
      border-radius: 48px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.1);
      overflow: hidden;
      backdrop-filter: blur(4px);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .auth-header {
      background: rgba(0, 229, 255, 0.05);
      padding: 30px 30px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 229, 255, 0.2);
    }
    .logo {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #00F2FE, #4FACFE);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }
    .logo i {
      margin-right: 8px;
      color: #00E5FF;
    }
    .auth-header p {
      color: #94A3B8;
      font-size: 0.9rem;
    }
    .auth-tabs {
      display: flex;
      margin: 0 30px;
      border-bottom: 1px solid #1E2A3A;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      color: #94A3B8;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }
    .tab-btn.active {
      color: #00E5FF;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #00E5FF;
      box-shadow: 0 0 8px #00E5FF;
    }
    .auth-form {
      padding: 30px;
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #CBD5E1;
    }
    .input-icon {
      position: relative;
    }
    .input-icon i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #00E5FF;
    }
    .input-icon input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: #1F2A3A;
      border: 1px solid #2C3E50;
      border-radius: 60px;
      color: white;
      font-size: 1rem;
      transition: 0.2s;
    }
    .input-icon input:focus {
      border-color: #00E5FF;
      outline: none;
      box-shadow: 0 0 12px #00E5FF33;
    }
    .btn-auth {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #00E5FF, #007BFF);
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
    }
    .btn-auth:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px #00E5FF;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #94A3B8;
    }
    .auth-footer a {
      color: #00E5FF;
      text-decoration: none;
      cursor: pointer;
    }
    .message {
      margin-top: 16px;
      padding: 10px;
      border-radius: 40px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    .message.error {
      background: rgba(255, 68, 68, 0.2);
      border: 1px solid #FF4444;
      color: #FF8888;
      display: block;
    }
    .message.success {
      background: rgba(0, 229, 255, 0.2);
      border: 1px solid #00E5FF;
      color: #00E5FF;
      display: block;
    }
    .forgot-link {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot-link a {
      color: #00E5FF;
      font-size: 0.8rem;
      text-decoration: none;
    }
    @media (max-width: 500px) {
      .auth-container { border-radius: 32px; }
      .auth-header { padding: 20px; }
      .auth-form { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <div class="logo"><i class="fas fa-skull"></i> Steam<span>Fall</span></div>
      <p>Войди в свой аккаунт или создай новый</p>
    </div>
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Вход</button>
      <button class="tab-btn" data-tab="register">Регистрация</button>
    </div>

    <!-- Форма входа -->
    <div id="loginForm" class="auth-form">
      <div class="form-group">
        <label>Логин</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUsername" placeholder="Введите логин">
        </div>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Введите пароль">
        </div>
      </div>
      <div class="forgot-link">
        <a href="#" id="forgotPasswordLink">Забыли пароль?</a>
      </div>
      <button class="btn-auth" id="doLoginBtn"><i class="fas fa-sign-in-alt"></i> Войти</button>
      <div id="loginMessage" class="message"></div>
    </div>

    <!-- Форма регистрации (скрыта по умолчанию) -->
    <div id="registerForm" class="auth-form" style="display: none;">
      <div class="form-group">
        <label>Логин (минимум 3 символа)</label>
        <div class="input-icon">
          <i class="fas fa-user-plus"></i>
          <input type="text" id="regUsername" placeholder="Придумайте логин">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>Пароль (минимум 6 символов)</label>
        <div class="input-icon">
          <i class="fas fa-key"></i>
          <input type="password" id="regPassword" placeholder="Придумайте пароль">
        </div>
      </div>
      <div class="form-group">
        <label>Подтверждение пароля</label>
        <div class="input-icon">
          <i class="fas fa-check-circle"></i>
          <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль">
        </div>
      </div>
      <button class="btn-auth" id="doRegisterBtn"><i class="fas fa-user-check"></i> Зарегистрироваться</button>
      <div id="registerMessage" class="message"></div>
    </div>

    <div class="auth-footer">
      <span id="footerText">Нет аккаунта? <a id="switchToRegister">Зарегистрируйтесь</a></span>
    </div>
  </div>

  <!-- Модалка восстановления пароля (простая) -->
  <div id="forgotModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:#0F1219; border-radius:32px; padding:32px; max-width:400px; width:90%; border:1px solid #00E5FF;">
      <h3 style="margin-bottom:20px; color:#00E5FF;">Восстановление пароля</h3>
      <input type="email" id="resetEmail" placeholder="Ваш Email" style="width:100%; padding:12px; background:#1F2A3A; border:none; border-radius:40px; color:white; margin-bottom:20px;">
      <button id="doResetBtn" style="width:100%; padding:12px; background:#00E5FF; border:none; border-radius:40px; font-weight:bold; cursor:pointer;">Отправить инструкцию</button>
      <button id="closeModalBtn" style="margin-top:12px; background:none; border:none; color:#94A3B8; cursor:pointer;">Закрыть</button>
    </div>
  </div>

  <script>
    // Переключение табов
    const loginTab = document.querySelector('[data-tab="login"]');
    const registerTab = document.querySelector('[data-tab="register"]');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const footerText = document.getElementById('footerText');
    const switchLink = document.getElementById('switchToRegister');
    const forgotModal = document.getElementById('forgotModal');

    function showLogin() {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      footerText.innerHTML = 'Нет аккаунта? <a id="switchToRegister">Зарегистрируйтесь</a>';
      document.getElementById('switchToRegister').addEventListener('click', showRegister);
    }
    function showRegister() {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      footerText.innerHTML = 'Уже есть аккаунт? <a id="switchToLogin">Войдите</a>';
      document.getElementById('switchToLogin').addEventListener('click', showLogin);
    }
    loginTab.addEventListener('click', showLogin);
    registerTab.addEventListener('click', showRegister);
    if (switchLink) switchLink.addEventListener('click', showRegister);

    // Вход
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const msgDiv = document.getElementById('loginMessage');
      if (!username || !password) {
        msgDiv.textContent = 'Заполните все поля';
        msgDiv.className = 'message error';
        return;
      }
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка входа');
        localStorage.setItem('token', data.token);
        msgDiv.textContent = 'Успешный вход! Перенаправление...';
        msgDiv.className = 'message success';
        setTimeout(() => { window.location.href = '/'; }, 1000);
      } catch (err) {
        msgDiv.textContent = err.message;
        msgDiv.className = 'message error';
      }
    });

    // Регистрация
    document.getElementById('doRegisterBtn').addEventListener('click', async () => {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regPasswordConfirm').value;
      const msgDiv = document.getElementById('registerMessage');
      if (username.length < 3) {
        msgDiv.textContent = 'Логин минимум 3 символа';
        msgDiv.className = 'message error';
        return;
      }
      if (!email.includes('@')) {
        msgDiv.textContent = 'Введите корректный email';
        msgDiv.className = 'message error';
        return;
      }
      if (password.length < 6) {
        msgDiv.textContent = 'Пароль минимум 6 символов';
        msgDiv.className = 'message error';
        return;
      }
      if (password !== confirm) {
        msgDiv.textContent = 'Пароли не совпадают';
        msgDiv.className = 'message error';
        return;
      }
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || data.errors?.[0]?.msg || 'Ошибка регистрации');
        localStorage.setItem('token', data.token);
        msgDiv.textContent = 'Регистрация успешна! Перенаправление...';
        msgDiv.className = 'message success';
        setTimeout(() => { window.location.href = '/'; }, 1000);
      } catch (err) {
        msgDiv.textContent = err.message;
        msgDiv.className = 'message error';
      }
    });

    // Восстановление пароля (заглушка, но показывает сообщение)
    document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
      e.preventDefault();
      forgotModal.style.display = 'flex';
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
      forgotModal.style.display = 'none';
    });
    document.getElementById('doResetBtn').addEventListener('click', async () => {
      const email = document.getElementById('resetEmail').value;
      if (!email) {
        alert('Введите email');
        return;
      }
      // Здесь можно отправить запрос на сервер (для демо просто показываем сообщение)
      alert(`Инструкция по восстановлению отправлена на ${email} (демо-режим)`);
      forgotModal.style.display = 'none';
    });
  </script>
</body>
</html>
