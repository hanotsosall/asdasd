<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Вход и регистрация на SteamFall — торрент-трекере игр. Войдите в аккаунт или создайте новый.">
  <title>Вход / Регистрация | SteamFall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Дополнительные стили для страницы логина */
    .auth-container {
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .glass-card {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: var(--radius-2xl);
      padding: 40px 32px;
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-glass);
      animation: fadeInUp 0.4s ease;
    }
    .logo-center {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-center .logo {
      font-size: 32px;
      display: inline-block;
    }
    .subtitle {
      text-align: center;
      color: var(--color-text-secondary);
      margin-bottom: 28px;
    }
    .tabs {
      display: flex;
      gap: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 60px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--gradient-accent);
      color: white;
      box-shadow: 0 0 12px var(--color-accent-glow);
    }
    .form-group {
      margin-bottom: 24px;
    }
    .input-icon {
      position: relative;
    }
    .input-icon i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #a78bfa;
      font-size: 1rem;
    }
    .input-icon input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--color-border);
      border-radius: 60px;
      padding: 14px 20px 14px 48px;
      color: var(--color-text-primary);
      font-size: 1rem;
      transition: all 0.2s;
    }
    .input-icon input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px rgba(109,40,217,0.2);
    }
    .forgot-link {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot-link a {
      color: #a78bfa;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .btn-auth {
      width: 100%;
      background: var(--gradient-accent);
      border: none;
      border-radius: 60px;
      padding: 14px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-auth:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px var(--color-accent-glow);
    }
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 60px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    .message.error {
      background: rgba(239,68,68,0.15);
      border: 1px solid #ef4444;
      color: #f87171;
      display: block;
    }
    .message.success {
      background: rgba(16,185,129,0.15);
      border: 1px solid #10b981;
      color: #34d399;
      display: block;
    }
    .footer-text {
      text-align: center;
      margin-top: 28px;
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
    .footer-text a {
      color: #a78bfa;
      text-decoration: none;
      cursor: pointer;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: var(--radius-2xl);
      padding: 32px;
      max-width: 400px;
      width: 90%;
      border: 1px solid var(--color-accent);
    }
    .modal-content h3 {
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--color-border);
      border-radius: 60px;
      padding: 12px 16px;
      color: var(--color-text-primary);
      margin-bottom: 20px;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
    }
    .modal-buttons button {
      flex: 1;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <div class="logo"><i class="fas fa-dragon"></i> Steam<span style="background: linear-gradient(135deg, #a78bfa, #6366f1); background-clip: text; -webkit-background-clip: text; color: transparent;">Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
      <a href="/faq.html">FAQ</a>
      <a href="/contacts.html">Контакты</a>
    </div>
    <div class="auth-buttons">
      <a href="/login.html" class="btn-outline">Войти</a>
      <a href="/login.html?register=1" class="btn-primary">Регистрация</a>
    </div>
  </div>
</header>

<div class="auth-container">
  <div class="glass-card">
    <div class="logo-center">
      <div class="logo"><i class="fas fa-dragon"></i> Steam<span style="background: linear-gradient(135deg, #a78bfa, #6366f1); background-clip: text; -webkit-background-clip: text; color: transparent;">Fall</span></div>
    </div>
    <div class="subtitle">Войдите или создайте аккаунт</div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Вход</button>
      <button class="tab-btn" data-tab="register">Регистрация</button>
    </div>

    <!-- Форма входа -->
    <div id="loginForm">
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUsername" placeholder="Логин" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
        </div>
      </div>
      <div class="forgot-link">
        <a href="#" id="forgotPasswordLink">Забыли пароль?</a>
      </div>
      <button id="doLoginBtn" class="btn-auth">Войти</button>
      <div id="loginMessage" class="message"></div>
    </div>

    <!-- Форма регистрации (скрыта) -->
    <div id="registerForm" style="display: none;">
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-user-plus"></i>
          <input type="text" id="regUsername" placeholder="Логин (мин. 3)">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="Email">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-key"></i>
          <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-check-circle"></i>
          <input type="password" id="regPasswordConfirm" placeholder="Подтверждение пароля">
        </div>
      </div>
      <button id="doRegisterBtn" class="btn-auth">Зарегистрироваться</button>
      <div id="registerMessage" class="message"></div>
    </div>

    <div class="footer-text" id="footerSwitch">
      Нет аккаунта? <a id="switchToRegister">Регистрация</a>
    </div>
  </div>
</div>

<!-- Модалка восстановления пароля -->
<div id="forgotModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-envelope"></i> Восстановление пароля</h3>
    <input type="email" id="resetEmail" placeholder="Ваш Email">
    <div class="modal-buttons">
      <button id="doResetBtn" class="btn-auth">Отправить</button>
      <button id="closeModalBtn" style="background: transparent; border: 1px solid var(--color-accent);">Закрыть</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p>© 2025 SteamFall — торрент-трекер игр</p>
  </div>
</footer>

<div id="toast" class="toast"></div>

<script>
  // Анимация хедера
  window.addEventListener('scroll', function() {
    const header = document.getElementById('header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });

  // Переключение табов
  const loginTab = document.querySelector('[data-tab="login"]');
  const registerTab = document.querySelector('[data-tab="register"]');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const footerSwitch = document.getElementById('footerSwitch');
  let switchToRegister = document.getElementById('switchToRegister');

  function showLogin() {
    loginForm.style.display = 'block';
    registerForm.style.display = 'none';
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    footerSwitch.innerHTML = 'Нет аккаунта? <a id="switchToRegister">Регистрация</a>';
    document.getElementById('switchToRegister').addEventListener('click', showRegister);
  }
  function showRegister() {
    loginForm.style.display = 'none';
    registerForm.style.display = 'block';
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    footerSwitch.innerHTML = 'Уже есть аккаунт? <a id="switchToLogin">Вход</a>';
    document.getElementById('switchToLogin').addEventListener('click', showLogin);
  }
  loginTab.addEventListener('click', showLogin);
  registerTab.addEventListener('click', showRegister);
  if (switchToRegister) switchToRegister.addEventListener('click', showRegister);
  if (window.location.search.includes('register=1')) showRegister();

  // Вход
  document.getElementById('doLoginBtn').addEventListener('click', async () => {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('loginMessage');
    if (!username || !password) {
      msgDiv.textContent = 'Заполните все поля';
      msgDiv.className = 'message error';
      return;
    }
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Ошибка входа');
      localStorage.setItem('token', data.token);
      msgDiv.textContent = 'Успешный вход! Перенаправление...';
      msgDiv.className = 'message success';
      setTimeout(() => { window.location.href = '/'; }, 1000);
    } catch (err) {
      msgDiv.textContent = err.message;
      msgDiv.className = 'message error';
    }
  });

  // Регистрация
  document.getElementById('doRegisterBtn').addEventListener('click', async () => {
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regPasswordConfirm').value;
    const msgDiv = document.getElementById('registerMessage');
    if (username.length < 3) {
      msgDiv.textContent = 'Логин минимум 3 символа';
      msgDiv.className = 'message error';
      return;
    }
    if (!email.includes('@')) {
      msgDiv.textContent = 'Введите корректный email';
      msgDiv.className = 'message error';
      return;
    }
    if (password.length < 6) {
      msgDiv.textContent = 'Пароль минимум 6 символов';
      msgDiv.className = 'message error';
      return;
    }
    if (password !== confirm) {
      msgDiv.textContent = 'Пароли не совпадают';
      msgDiv.className = 'message error';
      return;
    }
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Ошибка регистрации');
      localStorage.setItem('token', data.token);
      msgDiv.textContent = 'Регистрация успешна! Перенаправление...';
      msgDiv.className = 'message success';
      setTimeout(() => { window.location.href = '/'; }, 1000);
    } catch (err) {
      msgDiv.textContent = err.message;
      msgDiv.className = 'message error';
    }
  });

  // Восстановление пароля (демо)
  const forgotModal = document.getElementById('forgotModal');
  document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
    e.preventDefault();
    forgotModal.classList.add('active');
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    forgotModal.classList.remove('active');
  });
  document.getElementById('doResetBtn').addEventListener('click', () => {
    const email = document.getElementById('resetEmail').value;
    if (!email) {
      alert('Введите email');
      return;
    }
    alert(`Инструкция отправлена на ${email} (демо-режим)`);
    forgotModal.classList.remove('active');
  });
  window.addEventListener('click', (e) => {
    if (e.target === forgotModal) forgotModal.classList.remove('active');
  });
</script>
</body>
</html>
