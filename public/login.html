<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Вход / Регистрация | SteamFall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    /* Анимированный фон */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #0f172a, #020617);
    }
    .animated-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
      animation: rotateBg 25s linear infinite;
    }
    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* Плавающие частицы */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      background: rgba(59,130,246,0.3);
      border-radius: 50%;
      filter: blur(2px);
      animation: floatParticle 15s infinite ease-in-out;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-20vh) translateX(100px) scale(1); opacity: 0; }
    }
    /* Главный контейнер */
    .auth-container {
      width: 100%;
      max-width: 460px;
      margin: 20px;
      position: relative;
      z-index: 2;
      animation: fadeInScale 0.6s cubic-bezier(0.2,0.9,0.4,1.1);
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    /* Стеклянная карточка */
    .glass-card {
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 40px;
      border: 1px solid rgba(59,130,246,0.3);
      padding: 40px 32px;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 6s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    /* Табы */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      background: rgba(0,0,0,0.3);
      border-radius: 60px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #3b82f6;
      color: white;
      box-shadow: 0 0 12px #3b82f6;
    }
    /* Формы */
    .form-group {
      margin-bottom: 20px;
    }
    .input-icon {
      position: relative;
    }
    .input-icon i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #60a5fa;
      font-size: 1rem;
    }
    .input-icon input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid #1e293b;
      border-radius: 60px;
      padding: 14px 20px 14px 48px;
      color: white;
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }
    .input-icon input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }
    button[type="submit"] {
      width: 100%;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 60px;
      padding: 14px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 16px;
    }
    button[type="submit"]:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px #3b82f6;
    }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 60px;
      text-align: center;
      font-size: 0.85rem;
      display: none;
    }
    .message.error {
      background: rgba(239,68,68,0.2);
      border: 1px solid #ef4444;
      color: #f87171;
      display: block;
    }
    .message.success {
      background: rgba(34,197,94,0.2);
      border: 1px solid #22c55e;
      color: #4ade80;
      display: block;
    }
    .forgot-link {
      text-align: right;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot-link a {
      color: #60a5fa;
      font-size: 0.8rem;
      text-decoration: none;
    }
    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .footer-text a {
      color: #60a5fa;
      text-decoration: none;
      cursor: pointer;
    }
    /* Модалка восстановления пароля */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: rgba(17,24,39,0.95);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      border: 1px solid #3b82f6;
    }
    .modal-content h3 {
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-content input {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border: 1px solid #1e293b;
      border-radius: 60px;
      color: white;
      margin-bottom: 20px;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
    }
    .modal-buttons button {
      flex: 1;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #3b82f6;
      padding: 12px 28px;
      border-radius: 60px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="particles" id="particles"></div>
<div class="auth-container">
  <div class="glass-card">
    <div class="logo"><i class="fas fa-skull"></i> Steam<span>Fall</span></div>
    <div class="subtitle">Войди или создай аккаунт</div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Вход</button>
      <button class="tab-btn" data-tab="register">Регистрация</button>
    </div>
    <!-- Форма входа -->
    <div id="loginForm" class="form-pane">
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUsername" placeholder="Логин" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="current-password">
        </div>
      </div>
      <div class="forgot-link">
        <a href="#" id="forgotPasswordLink">Забыли пароль?</a>
      </div>
      <button type="submit" id="doLoginBtn">Войти</button>
      <div id="loginMessage" class="message"></div>
    </div>
    <!-- Форма регистрации -->
    <div id="registerForm" class="form-pane" style="display: none;">
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-user-plus"></i>
          <input type="text" id="regUsername" placeholder="Логин (мин. 3)">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="Email">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-key"></i>
          <input type="password" id="regPassword" placeholder="Пароль (мин. 6)">
        </div>
      </div>
      <div class="form-group">
        <div class="input-icon">
          <i class="fas fa-check-circle"></i>
          <input type="password" id="regPasswordConfirm" placeholder="Подтверждение пароля">
        </div>
      </div>
      <button type="submit" id="doRegisterBtn">Зарегистрироваться</button>
      <div id="registerMessage" class="message"></div>
    </div>
    <div class="footer-text">
      <span id="footerSwitch">Нет аккаунта? <a id="switchToRegister">Регистрация</a></span>
    </div>
  </div>
</div>
<!-- Модалка восстановления пароля -->
<div id="forgotModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-envelope"></i> Восстановление пароля</h3>
    <input type="email" id="resetEmail" placeholder="Ваш Email">
    <div class="modal-buttons">
      <button id="doResetBtn">Отправить</button>
      <button id="closeModalBtn" class="btn-outline" style="background: transparent; border:1px solid #3b82f6;">Закрыть</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
  (function() {
    // Плавающие частицы
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random() * 6 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = Math.random() * 20 + 10 + 's';
        p.style.animationDelay = Math.random() * 20 + 's';
        container.appendChild(p);
      }
    }
    createParticles();

    // Тосты
    const toast = document.getElementById('toast');
    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.style.color = isError ? '#ef4444' : '#3b82f6';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Переключение табов
    const loginTab = document.querySelector('[data-tab="login"]');
    const registerTab = document.querySelector('[data-tab="register"]');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const footerSwitch = document.getElementById('footerSwitch');
    const switchToRegister = document.getElementById('switchToRegister');

    function showLogin() {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      footerSwitch.innerHTML = 'Нет аккаунта? <a id="switchToRegister">Регистрация</a>';
      document.getElementById('switchToRegister').addEventListener('click', showRegister);
    }
    function showRegister() {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      footerSwitch.innerHTML = 'Уже есть аккаунт? <a id="switchToLogin">Вход</a>';
      document.getElementById('switchToLogin').addEventListener('click', showLogin);
    }
    loginTab.addEventListener('click', showLogin);
    registerTab.addEventListener('click', showRegister);
    if (switchToRegister) switchToRegister.addEventListener('click', showRegister);
    if (window.location.search.includes('register=1')) showRegister();

    // Вход
    document.getElementById('doLoginBtn').addEventListener('click', async () => {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const msgDiv = document.getElementById('loginMessage');
      if (!username || !password) {
        msgDiv.textContent = 'Заполните все поля';
        msgDiv.className = 'message error';
        return;
      }
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка входа');
        localStorage.setItem('token', data.token);
        msgDiv.textContent = 'Успешный вход! Перенаправление...';
        msgDiv.className = 'message success';
        showToast('Добро пожаловать!');
        setTimeout(() => { window.location.href = '/'; }, 1000);
      } catch (err) {
        msgDiv.textContent = err.message;
        msgDiv.className = 'message error';
      }
    });

    // Регистрация
    document.getElementById('doRegisterBtn').addEventListener('click', async () => {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regPasswordConfirm').value;
      const msgDiv = document.getElementById('registerMessage');
      if (username.length < 3) {
        msgDiv.textContent = 'Логин минимум 3 символа';
        msgDiv.className = 'message error';
        return;
      }
      if (!email.includes('@')) {
        msgDiv.textContent = 'Введите корректный email';
        msgDiv.className = 'message error';
        return;
      }
      if (password.length < 6) {
        msgDiv.textContent = 'Пароль минимум 6 символов';
        msgDiv.className = 'message error';
        return;
      }
      if (password !== confirm) {
        msgDiv.textContent = 'Пароли не совпадают';
        msgDiv.className = 'message error';
        return;
      }
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка регистрации');
        localStorage.setItem('token', data.token);
        msgDiv.textContent = 'Регистрация успешна! Перенаправление...';
        msgDiv.className = 'message success';
        showToast('Добро пожаловать на SteamFall!');
        setTimeout(() => { window.location.href = '/'; }, 1000);
      } catch (err) {
        msgDiv.textContent = err.message;
        msgDiv.className = 'message error';
      }
    });

    // Восстановление пароля (демо)
    const forgotModal = document.getElementById('forgotModal');
    document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
      e.preventDefault();
      forgotModal.classList.add('active');
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
      forgotModal.classList.remove('active');
    });
    document.getElementById('doResetBtn').addEventListener('click', () => {
      const email = document.getElementById('resetEmail').value;
      if (!email) {
        showToast('Введите email', true);
        return;
      }
      showToast(`Инструкция отправлена на ${email} (демо-режим)`);
      forgotModal.classList.remove('active');
    });
    // Закрытие модалки по клику на фон
    window.addEventListener('click', (e) => {
      if (e.target === forgotModal) forgotModal.classList.remove('active');
    });
  })();
</script>
</body>
</html>
