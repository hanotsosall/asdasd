<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Топ игр | SteamFall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      line-height: 1.5;
      overflow-x: hidden;
    }
    /* Анимированный фон */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #0f172a, #020617);
    }
    .animated-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
      animation: rotateBg 25s linear infinite;
    }
    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      background: rgba(59,130,246,0.3);
      border-radius: 50%;
      filter: blur(2px);
      animation: floatParticle 15s infinite ease-in-out;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-20vh) translateX(100px) scale(1); opacity: 0; }
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }
    /* Хедер */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 12, 16, 0.6);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59,130,246,0.2);
    }
    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 6s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .nav-links a {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: #60a5fa;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #3b82f6;
      padding: 8px 20px;
      border-radius: 40px;
      color: #3b82f6;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s;
    }
    .btn-outline:hover {
      background: rgba(59,130,246,0.1);
      transform: translateY(-2px);
    }
    /* Основной контент */
    .top-hero {
      text-align: center;
      margin: 40px 0 30px;
      animation: fadeInUp 0.6s ease;
    }
    .top-hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #fbbf24);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .top-hero p {
      color: #94a3b8;
      margin-top: 12px;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Сетка топа */
    .top-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 40px 0;
    }
    .top-item {
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid rgba(59,130,246,0.2);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      transition: all 0.3s;
    }
    .top-item:hover {
      transform: translateX(8px);
      border-color: #fbbf24;
      box-shadow: 0 10px 25px -8px rgba(251,191,36,0.2);
    }
    .top-rank {
      font-size: 2.5rem;
      font-weight: 800;
      min-width: 80px;
      text-align: center;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .top-cover {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: cover;
      background: #1e293b;
    }
    .top-info {
      flex: 2;
      min-width: 200px;
    }
    .top-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .top-title a {
      color: #e2e8f0;
      text-decoration: none;
    }
    .top-title a:hover {
      color: #60a5fa;
    }
    .top-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .top-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .stat-badge {
      background: rgba(0,0,0,0.4);
      border-radius: 40px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-badge i {
      color: #fbbf24;
    }
    .download-btn-small {
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .download-btn-small:hover {
      transform: scale(1.02);
      box-shadow: 0 0 12px #3b82f6;
    }
    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
      color: #94a3b8;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #3b82f6;
      padding: 12px 28px;
      border-radius: 60px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid #1e293b;
      margin-top: 50px;
    }
    @media (max-width: 700px) {
      .top-item { flex-direction: column; text-align: center; }
      .top-rank { text-align: center; }
      .top-stats { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="animated-bg"></div>
<div class="particles" id="particles"></div>
<header class="header">
  <div class="container">
    <div class="logo"><i class="fas fa-skull"></i> Steam<span>Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
    </div>
    <div class="auth-buttons" id="authButtons">
      <a href="/login.html" class="btn-outline">Войти</a>
    </div>
  </div>
</header>
<main class="container">
  <div class="top-hero">
    <h1><i class="fas fa-trophy"></i> Топ игр SteamFall</h1>
    <p>Самые скачиваемые и популярные игры по версии нашего сообщества</p>
  </div>
  <div id="topContainer" class="top-list">
    <div class="loading">Загрузка топ-игр...</div>
  </div>
</main>
<footer>
  <div class="container"><p>© 2025 SteamFall — торрент-трекер игр</p></div>
</footer>
<div id="toast" class="toast"></div>
<script>
  (function() {
    // Генерация частиц
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.classList.add('particle');
        const size = Math.random() * 6 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = Math.random() * 20 + 10 + 's';
        p.style.animationDelay = Math.random() * 20 + 's';
        container.appendChild(p);
      }
    }
    createParticles();

    const toast = document.getElementById('toast');
    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.style.color = isError ? '#ef4444' : '#3b82f6';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const container = document.getElementById('topContainer');

    async function loadTopGames() {
      try {
        // Сортировка по убыванию скачиваний
        const res = await fetch('/api/games?sort=downloads&limit=20');
        const data = await res.json();
        const games = data.games;
        if (!games.length) {
          container.innerHTML = '<div class="loading">😢 Нет данных для топа</div>';
          return;
        }
        renderTop(games);
      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="loading">⚠️ Ошибка загрузки топа. Попробуйте позже.</div>';
        showToast('Ошибка загрузки', true);
      }
    }

    function renderTop(games) {
      container.innerHTML = games.map((game, idx) => `
        <div class="top-item" data-id="${game.id}">
          <div class="top-rank">#${idx + 1}</div>
          <img class="top-cover" src="${game.screenshots?.[0] || 'https://picsum.photos/id/0/80/80'}" alt="${escapeHtml(game.title)}">
          <div class="top-info">
            <div class="top-title"><a href="/game.html?id=${game.id}">${escapeHtml(game.title)}</a></div>
            <div class="top-meta">
              <span><i class="fas fa-tag"></i> ${escapeHtml(game.genre)}</span>
              <span><i class="fas fa-code-branch"></i> ${escapeHtml(game.developer || 'Unknown')}</span>
              <span><i class="fas fa-calendar"></i> ${new Date(game.releaseDate).toLocaleDateString()}</span>
            </div>
          </div>
          <div class="top-stats">
            <div class="stat-badge"><i class="fas fa-download"></i> ${formatNumber(game.downloads)}</div>
            <div class="stat-badge"><i class="fas fa-arrow-up"></i> ${game.seeders}</div>
            <div class="stat-badge"><i class="fas fa-star"></i> ${game.rating || '—'}</div>
            <button class="download-btn-small" data-magnet="${escapeHtml(game.magnet)}">Скачать торрент</button>
          </div>
        </div>
      `).join('');

      // Обработчики кнопок скачивания
      document.querySelectorAll('.download-btn-small').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const magnet = btn.getAttribute('data-magnet');
          if (magnet && magnet !== 'undefined') {
            window.open(magnet, '_blank');
            showToast('Торрент запущен в клиенте');
          } else {
            showToast('Magnet-ссылка недоступна', true);
          }
        });
      });

      if (typeof anime !== 'undefined') {
        anime({
          targets: '.top-item',
          opacity: [0, 1],
          translateX: [-30, 0],
          delay: anime.stagger(80),
          duration: 600,
          easing: 'easeOutQuad'
        });
      }
    }

    function formatNumber(num) {
      if (!num) return '0';
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    loadTopGames();
  })();
</script>
</body>
</html>
