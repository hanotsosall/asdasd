<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Топ-20 самых скачиваемых игр на SteamFall. Популярные хиты и лучшие новинки по версии пользователей.">
  <title>Топ игр | SteamFall — самые скачиваемые</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .top-hero {
      text-align: center;
      margin: 40px 0 30px;
      animation: fadeInUp 0.4s ease;
    }
    .top-hero h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #fff, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .top-hero p {
      color: var(--color-text-secondary);
      margin-top: 12px;
    }
    .top-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin: 40px 0 60px;
    }
    .top-item {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: var(--radius-xl);
      padding: 20px;
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      transition: all 0.2s;
    }
    .top-item:hover {
      transform: translateX(8px);
      border-color: var(--color-accent);
    }
    .top-rank {
      font-size: 2rem;
      font-weight: 800;
      min-width: 70px;
      text-align: center;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .top-cover {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-lg);
      object-fit: cover;
      background: var(--color-bg-secondary);
    }
    .top-info {
      flex: 2;
      min-width: 180px;
    }
    .top-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .top-title a {
      color: var(--color-text-primary);
      text-decoration: none;
    }
    .top-title a:hover {
      color: #a78bfa;
    }
    .top-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .top-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .stat-badge {
      background: rgba(0,0,0,0.3);
      border-radius: 40px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }
    .stat-badge i {
      color: #fbbf24;
    }
    .download-btn-small {
      background: var(--gradient-accent);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .download-btn-small:hover {
      transform: scale(1.02);
      box-shadow: 0 0 12px var(--color-accent-glow);
    }
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--color-text-muted);
    }
    @media (max-width: 700px) {
      .top-item { flex-direction: column; text-align: center; }
      .top-rank { text-align: center; }
      .top-stats { justify-content: center; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <div class="logo"><i class="fas fa-dragon"></i> Steam<span style="background: linear-gradient(135deg, #a78bfa, #6366f1); background-clip: text; -webkit-background-clip: text; color: transparent;">Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
      <a href="/faq.html">FAQ</a>
      <a href="/rules.html">Правила</a>
    </div>
    <div class="auth-buttons">
      <a href="/login.html" class="btn-outline">Войти</a>
      <a href="/login.html?register=1" class="btn-primary">Регистрация</a>
    </div>
  </div>
</header>

<main class="container">
  <div class="top-hero">
    <h1><i class="fas fa-trophy"></i> Топ-20 игр</h1>
    <p>Самые скачиваемые и популярные игры по версии нашего сообщества</p>
  </div>
  <div id="topContainer" class="top-list">
    <div class="loading">Загрузка топа...</div>
  </div>
</main>

<footer>
  <div class="container">
    <p>© 2025 SteamFall — торрент-трекер игр. Рейтинг обновляется ежедневно.</p>
  </div>
</footer>

<div id="toast" class="toast"></div>

<script>
  // Анимация хедера
  window.addEventListener('scroll', function() {
    const header = document.getElementById('header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });

  const container = document.getElementById('topContainer');
  const toast = document.getElementById('toast');

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.style.color = isError ? '#ef4444' : '#a78bfa';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  async function loadTopGames() {
    try {
      const res = await fetch('/api/games?sort=downloads&limit=20');
      const data = await res.json();
      const games = data.games;
      if (!games.length) {
        container.innerHTML = '<div class="loading">😢 Нет данных для топа</div>';
        return;
      }
      renderTop(games);
    } catch (err) {
      container.innerHTML = '<div class="loading">⚠️ Ошибка загрузки топа. Попробуйте позже.</div>';
      showToast('Ошибка загрузки', true);
    }
  }

  function renderTop(games) {
    container.innerHTML = games.map((game, idx) => `
      <div class="top-item" data-id="${game.id}">
        <div class="top-rank">#${idx + 1}</div>
        <img class="top-cover" src="${game.screenshots?.[0] || 'https://picsum.photos/id/0/80/80'}" alt="${escapeHtml(game.title)}">
        <div class="top-info">
          <div class="top-title"><a href="/game.html?id=${game.id}">${escapeHtml(game.title)}</a></div>
          <div class="top-meta">
            <span><i class="fas fa-tag"></i> ${escapeHtml(game.genre)}</span>
            <span><i class="fas fa-code-branch"></i> ${escapeHtml(game.developer || 'Unknown')}</span>
            <span><i class="fas fa-calendar"></i> ${new Date(game.releaseDate).toLocaleDateString()}</span>
          </div>
        </div>
        <div class="top-stats">
          <div class="stat-badge"><i class="fas fa-download"></i> ${formatNumber(game.downloads)}</div>
          <div class="stat-badge"><i class="fas fa-arrow-up"></i> ${game.seeders}</div>
          <div class="stat-badge"><i class="fas fa-star"></i> ${game.rating || '—'}</div>
          <button class="download-btn-small" data-magnet="${escapeHtml(game.magnet)}">Скачать торрент</button>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.download-btn-small').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const magnet = btn.getAttribute('data-magnet');
        if (magnet && magnet !== 'undefined') {
          window.open(magnet, '_blank');
          showToast('Торрент запущен в клиенте');
        } else {
          showToast('Magnet-ссылка недоступна', true);
        }
      });
    });
  }

  function formatNumber(num) {
    if (!num) return '0';
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  loadTopGames();
</script>
</body>
</html>
