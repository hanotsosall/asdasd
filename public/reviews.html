<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Отзывы игроков о торрент-играх на SteamFall. Читайте мнения, ставьте оценки, пишите свои отзывы.">
  <title>Отзывы игроков | SteamFall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .reviews-hero {
      text-align: center;
      margin: 40px 0 30px;
      animation: fadeInUp 0.4s ease;
    }
    .reviews-hero h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #fff, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .reviews-hero p {
      color: var(--color-text-secondary);
      margin-top: 12px;
    }
    .filter-bar {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: 60px;
      padding: 8px 20px;
      margin-bottom: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      border: 1px solid var(--color-border);
    }
    .filter-bar select {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--color-border);
      border-radius: 40px;
      padding: 8px 20px;
      color: var(--color-text-primary);
      outline: none;
    }
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 50px;
    }
    .review-card {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border-radius: var(--radius-xl);
      padding: 20px;
      border: 1px solid var(--color-border);
      transition: all 0.2s;
    }
    .review-card:hover {
      transform: translateY(-4px);
      border-color: var(--color-accent);
    }
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .review-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .review-author img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #a78bfa;
    }
    .review-author strong {
      font-size: 1rem;
    }
    .review-rating {
      color: #fbbf24;
      letter-spacing: 2px;
    }
    .review-game {
      display: inline-block;
      background: rgba(109,40,217,0.15);
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
      color: #a78bfa;
      margin-bottom: 12px;
    }
    .review-text {
      margin: 12px 0;
      line-height: 1.5;
      color: var(--color-text-secondary);
    }
    .review-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }
    .review-likes {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .review-likes i {
      color: #ef4444;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 40px 0;
    }
    .page-btn {
      background: var(--color-surface);
      backdrop-filter: var(--blur-glass);
      border: 1px solid var(--color-border);
      padding: 8px 16px;
      border-radius: 40px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: 0.2s;
    }
    .page-btn.active, .page-btn:hover {
      background: var(--gradient-accent);
      border-color: var(--color-accent);
      color: white;
    }
    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
      color: var(--color-text-secondary);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <div class="logo"><i class="fas fa-dragon"></i> Steam<span style="background: linear-gradient(135deg, #a78bfa, #6366f1); background-clip: text; -webkit-background-clip: text; color: transparent;">Fall</span></div>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="/top.html">Топ</a>
      <a href="/reviews.html">Отзывы</a>
      <a href="/faq.html">FAQ</a>
      <a href="/contacts.html">Контакты</a>
    </div>
    <div class="auth-buttons">
      <a href="/login.html" class="btn-outline">Войти</a>
      <a href="/login.html?register=1" class="btn-primary">Регистрация</a>
    </div>
  </div>
</header>

<main class="container">
  <div class="reviews-hero">
    <h1><i class="fas fa-star"></i> Отзывы игроков</h1>
    <p>Честные мнения о играх. Ты тоже можешь оставить отзыв на странице любой игры.</p>
  </div>
  <div class="filter-bar">
    <span><i class="fas fa-filter"></i> Фильтр:</span>
    <select id="ratingFilter">
      <option value="all">Все оценки</option>
      <option value="5">5 ★</option>
      <option value="4">4+ ★</option>
      <option value="3">3+ ★</option>
    </select>
    <select id="sortFilter">
      <option value="date">По дате (новые)</option>
      <option value="likes">По полезности</option>
      <option value="rating">По оценке</option>
    </select>
  </div>
  <div id="reviewsContainer" class="reviews-grid">
    <div class="loading">Загрузка отзывов...</div>
  </div>
  <div id="pagination" class="pagination"></div>
</main>

<footer>
  <div class="container">
    <p>© 2025 SteamFall — торрент-трекер игр. Читайте отзывы и оставляйте свои.</p>
  </div>
</footer>

<div id="toast" class="toast"></div>

<script>
  window.addEventListener('scroll', function() {
    const header = document.getElementById('header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });

  let allReviews = [];
  let filteredReviews = [];
  let currentPage = 1;
  const reviewsPerPage = 12;
  const container = document.getElementById('reviewsContainer');
  const paginationDiv = document.getElementById('pagination');
  const ratingFilter = document.getElementById('ratingFilter');
  const sortFilter = document.getElementById('sortFilter');

  async function loadAllReviews() {
    try {
      const gamesRes = await fetch('/api/games?limit=100');
      const gamesData = await gamesRes.json();
      const games = gamesData.games;
      let reviews = [];
      for (const game of games) {
        const revRes = await fetch(`/api/reviews/${game.id}`);
        const gameReviews = await revRes.json();
        gameReviews.forEach(rev => {
          rev.gameTitle = game.title;
          rev.gameId = game.id;
          rev.gameCover = game.screenshots?.[0] || 'https://picsum.photos/id/0/100/100';
        });
        reviews.push(...gameReviews);
      }
      reviews.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      allReviews = reviews;
      applyFiltersAndRender();
    } catch (err) {
      container.innerHTML = '<div class="loading">⚠️ Не удалось загрузить отзывы. Попробуйте позже.</div>';
    }
  }

  function applyFiltersAndRender() {
    let filtered = [...allReviews];
    const ratingVal = ratingFilter.value;
    if (ratingVal !== 'all') {
      const min = parseInt(ratingVal);
      filtered = filtered.filter(r => r.rating >= min);
    }
    const sortVal = sortFilter.value;
    if (sortVal === 'date') filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    else if (sortVal === 'likes') filtered.sort((a,b) => (b.likes || 0) - (a.likes || 0));
    else if (sortVal === 'rating') filtered.sort((a,b) => b.rating - a.rating);
    filteredReviews = filtered;
    currentPage = 1;
    renderReviews();
    renderPagination();
  }

  function renderReviews() {
    if (!filteredReviews.length) {
      container.innerHTML = '<div class="loading">😢 Пока нет отзывов. Будьте первым!</div>';
      return;
    }
    const start = (currentPage - 1) * reviewsPerPage;
    const end = start + reviewsPerPage;
    const pageReviews = filteredReviews.slice(start, end);
    container.innerHTML = pageReviews.map(rev => `
      <div class="review-card">
        <div class="review-header">
          <div class="review-author">
            <img src="https://i.pravatar.cc/80?img=${(rev.userId || rev.id) % 70}" alt="avatar">
            <strong>${escapeHtml(rev.author)}</strong>
          </div>
          <div class="review-rating">${'★'.repeat(rev.rating)}${'☆'.repeat(5-rev.rating)}</div>
        </div>
        <div class="review-game">
          <a href="/game.html?id=${rev.gameId}" style="color:#a78bfa; text-decoration:none;">🎮 ${escapeHtml(rev.gameTitle)}</a>
        </div>
        <div class="review-text">${escapeHtml(rev.text)}</div>
        <div class="review-footer">
          <span>📅 ${new Date(rev.createdAt).toLocaleDateString('ru-RU')}</span>
          <span class="review-likes"><i class="fas fa-thumbs-up"></i> ${rev.likes || 0}</span>
        </div>
      </div>
    `).join('');
  }

  function renderPagination() {
    const totalPages = Math.ceil(filteredReviews.length / reviewsPerPage);
    if (totalPages <= 1) { paginationDiv.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= totalPages; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    paginationDiv.innerHTML = html;
    document.querySelectorAll('.page-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentPage = parseInt(btn.dataset.page);
        renderReviews();
        renderPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  ratingFilter.addEventListener('change', applyFiltersAndRender);
  sortFilter.addEventListener('change', applyFiltersAndRender);
  loadAllReviews();
</script>
</body>
</html>
