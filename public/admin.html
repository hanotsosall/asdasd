<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | SteamFall ULTIMATE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Space Grotesk', sans-serif;
      background: #0a0c10;
      color: #e2e8f0;
      line-height: 1.5;
      overflow-x: hidden;
    }
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #0f172a, #020617);
    }
    .animated-bg::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, rgba(0,0,0,0) 70%);
      animation: rotateBg 30s linear infinite;
    }
    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }
    /* Header */
    .header {
      background: rgba(10, 12, 16, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(59,130,246,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6);
      background-size: 200% auto;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradientShift 6s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* Админ-контент */
    .admin-container {
      margin: 40px 0;
    }
    .stats-grid {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .stat-card {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 24px;
      flex: 1;
      text-align: center;
      border: 1px solid rgba(59,130,246,0.2);
      transition: all 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      border-color: #3b82f6;
      box-shadow: 0 10px 20px -5px rgba(59,130,246,0.3);
    }
    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #3b82f6;
    }
    /* Табы */
    .tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 12px rgba(59,130,246,0.4);
    }
    .tab-pane {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .tab-pane.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Карточки */
    .card {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 28px;
      margin-bottom: 32px;
      border: 1px solid #1e293b;
    }
    .card h2, .card h3 {
      margin-bottom: 20px;
      color: #60a5fa;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 60px;
      color: white;
      margin-bottom: 16px;
      transition: 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }
    button {
      background: #3b82f6;
      border: none;
      padding: 10px 24px;
      border-radius: 60px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #2563eb;
      transform: scale(1.02);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      overflow-x: auto;
      display: block;
    }
    .admin-table th, .admin-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #1e293b;
    }
    .admin-table th {
      color: #60a5fa;
    }
    .ad-block {
      background: #0f1117;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #3b82f6;
      padding: 12px 24px;
      border-radius: 60px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; }
    @media (max-width: 700px) {
      .stats-grid { flex-direction: column; }
      .admin-table { font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="animated-bg"></div>
<header class="header">
  <div class="container">
    <div class="logo"><i class="fas fa-skull"></i> SteamFall <span style="font-size:0.8rem;">Admin</span></div>
    <a href="/" class="btn-outline" style="background:#3b82f6; color:white; text-decoration:none; padding:8px 20px; border-radius:40px;">На сайт</a>
  </div>
</header>
<main class="container admin-container">
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="statGames">0</div><div>Игр</div></div>
    <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div>Пользователей</div></div>
    <div class="stat-card"><div class="stat-value" id="statDownloads">0</div><div>Скачиваний</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="games">🎮 Игры</button>
    <button class="tab-btn" data-tab="users">👥 Пользователи</button>
    <button class="tab-btn" data-tab="ads">📢 Реклама</button>
    <button class="tab-btn" data-tab="logs">📜 Логи</button>
  </div>

  <!-- Вкладка Игры -->
  <div id="games" class="tab-pane active">
    <div class="card">
      <h2>➕ Добавить игру</h2>
      <input type="text" id="gameTitle" placeholder="Название">
      <input type="text" id="gameGenre" placeholder="Жанр">
      <textarea id="gameDesc" rows="3" placeholder="Описание"></textarea>
      <input type="text" id="gameSize" placeholder="Размер (например 50 GB)">
      <input type="text" id="gameMagnet" placeholder="Magnet-ссылка">
      <input type="text" id="gameDeveloper" placeholder="Разработчик">
      <input type="date" id="gameReleaseDate">
      <input type="text" id="gameScreenshots" placeholder="URL скриншотов (через запятую)">
      <input type="text" id="gameTags" placeholder="Теги (через запятую)">
      <button id="addGameBtn">➕ Добавить игру</button>
    </div>
    <div class="card">
      <h2>🌐 Импорт с другого сайта</h2>
      <input type="text" id="importUrl" placeholder="https://example.com/game">
      <button id="importBtn">📥 Импорт</button>
    </div>
    <div class="card">
      <h2>📀 Загрузить .torrent файл</h2>
      <input type="file" id="uploadTorrent" accept=".torrent">
    </div>
    <div class="card">
      <h2>🗂️ Список игр</h2>
      <input type="text" id="gameSearch" placeholder="Поиск...">
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Название</th><th>Жанр</th><th>Размер</th><th>Действия</th></tr></thead>
          <tbody id="gamesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Вкладка Пользователи -->
  <div id="users" class="tab-pane">
    <div class="card">
      <h2>👥 Управление пользователями</h2>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead><tr><th>ID</th><th>Логин</th><th>Email</th><th>Роль</th><th>Статус</th><th>Действия</th></tr></thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Вкладка Реклама -->
  <div id="ads" class="tab-pane">
    <div class="card">
      <h2>📢 Редактирование рекламных блоков</h2>
      <div id="adsEditor"></div>
      <button id="saveAdsBtn">💾 Сохранить рекламу</button>
    </div>
  </div>

  <!-- Вкладка Логи -->
  <div id="logs" class="tab-pane">
    <div class="card">
      <h2>📜 Логи сервера</h2>
      <pre id="logsContent" style="background:#0f1117; padding:16px; border-radius:20px; max-height:400px; overflow:auto;"></pre>
      <button id="refreshLogsBtn">🔄 Обновить</button>
    </div>
  </div>
</main>
<div id="toast" class="toast"></div>
<script src="/js/admin.js"></script>
</body>
</html>
