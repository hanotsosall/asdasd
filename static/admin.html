<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SlateClean Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0F1117; color: #E2E8F0; font-family: system-ui; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1E293B; padding: 20px; border-radius: 20px; flex: 1; }
        table { width: 100%; border-collapse: collapse; background: #11161F; border-radius: 20px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1E293B; }
        th { background: #0F172A; }
        button { background: #3B82F6; border: none; border-radius: 10px; padding: 6px 12px; color: white; cursor: pointer; }
        .btn-danger { background: #EF4444; }
        input { background: #0F172A; border: 1px solid #334155; color: white; padding: 6px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>SlateClean Админ-панель</h1>
    <div class="stats" id="statsPanel">
        <div class="stat-card">👥 Всего пользователей: <span id="totalUsers">0</span></div>
        <div class="stat-card">💰 Оплатили: <span id="paidUsers">0</span></div>
        <div class="stat-card">📋 Логов за 24ч: <span id="logs24h">0</span></div>
    </div>
    <canvas id="activityChart" width="400" height="200" style="max-width: 600px; margin-bottom: 30px;"></canvas>
    <h2>Пользователи</h2>
    <table id="usersTable">
        <thead><tr><th>ID</th><th>Username</th><th>Зарегистрирован</th><th>Оплачен</th><th>Действия</th></tr></thead>
        <tbody></tbody>
    </table>
</div>
<script src="/static/admin.js"></script>
</body>
</html>
