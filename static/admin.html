<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SlateClean Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0B0E14;
            font-family: 'Inter', system-ui, sans-serif;
            color: #EDF2F7;
            padding: 32px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 24px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #11161F;
            border: 1px solid #1E293B;
            border-radius: 20px;
            padding: 20px;
        }
        .stat-title { font-size: 14px; color: #94A3B8; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; }
        table {
            width: 100%;
            background: #11161F;
            border-radius: 20px;
            overflow: hidden;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #1E293B;
        }
        th { background: #0F172A; font-weight: 600; }
        button {
            background: #3B82F6;
            border: none;
            border-radius: 10px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover { background: #2563EB; }
        .btn-danger { background: #EF4444; }
        .btn-danger:hover { background: #DC2626; }
        .inline { display: flex; gap: 8px; }
        canvas { max-width: 600px; margin-bottom: 32px; background: #11161F; border-radius: 20px; padding: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 SlateClean Админ-панель</h1>
    <div class="stats" id="statsPanel">
        <div class="stat-card"><div class="stat-title">👥 Всего пользователей</div><div class="stat-value" id="totalUsers">—</div></div>
        <div class="stat-card"><div class="stat-title">💰 Оплативших</div><div class="stat-value" id="paidUsers">—</div></div>
        <div class="stat-card"><div class="stat-title">📋 Логов за 24ч</div><div class="stat-value" id="logs24h">—</div></div>
    </div>
    <canvas id="activityChart" width="600" height="300"></canvas>
    <h2 style="margin-bottom: 16px;">📋 Пользователи</h2>
    <div style="overflow-x: auto;">
        <table id="usersTable">
            <thead><tr><th>ID</th><th>Username</th><th>Зарегистрирован</th><th>Оплачен</th><th>Действия</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script src="/static/admin.js"></script>
</body>
</html>
