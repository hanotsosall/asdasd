<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SlateClean — Управление цифровым следом</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0B0E14;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: #EDF2F7;
            padding: 24px 16px 40px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        /* Header */
        .header { margin-bottom: 32px; border-bottom: 1px solid #232830; padding-bottom: 20px; }
        .logo { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6EE7B7, #3B82F6); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .subhead { font-size: 14px; color: #94A3B8; margin-top: 6px; }
        /* Cards */
        .card {
            background: #11161F;
            border-radius: 24px;
            border: 1px solid #1E293B;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .card:hover { border-color: #334155; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1E293B;
            font-weight: 600;
        }
        .service-icon { font-size: 24px; margin-right: 12px; }
        .service-title { font-size: 18px; }
        .badge {
            background: #1E293B;
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-success { background: #0B3B2E; color: #6EE7B7; }
        .badge-warning { background: #3B2E0B; color: #FBBF24; }
        .panel {
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .panel.open { max-height: 300px; padding: 20px; }
        .btn {
            background: #1E293B;
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            font-weight: 600;
            color: #E2E8F0;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-primary { background: #3B82F6; color: white; }
        .btn-primary:hover { background: #2563EB; }
        .btn-secondary { background: #2D3748; }
        .btn-secondary:hover { background: #374151; }
        .result { margin-top: 16px; font-size: 13px; background: #0A0F16; padding: 12px; border-radius: 12px; color: #94A3B8; }
        input, textarea {
            background: #0F172A;
            border: 1px solid #1E293B;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: white;
            margin-top: 8px;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        hr { border-color: #1E293B; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">SlateClean</div>
        <div class="subhead">Профессиональная цифровая санация</div>
    </div>

    <!-- Карточка профиля -->
    <div class="card">
        <div class="card-header">
            <span>👤 Аккаунт</span>
            <span id="paidBadge" class="badge badge-warning">Не оплачен</span>
        </div>
        <div class="panel open" style="max-height: none; padding: 20px;">
            <div class="flex-between"><span>ID:</span> <span id="userIdSpan">—</span></div>
            <div class="flex-between" style="margin-top: 8px;"><span>Статус:</span> <span id="statusText">🔴 Не активирован</span></div>
            <button id="buyBtn" class="btn btn-primary">💰 Оплатить доступ — 500 ₽</button>
            <div style="font-size: 12px; color: #6B7280; margin-top: 12px; text-align: center;">Оплата на кошелёк 4100118620135634 с комментарием: ваш Telegram ID</div>
        </div>
    </div>

    <!-- Сервисы (аналогично, для каждого) -->
    <div class="card" data-service="gmail">
        <div class="card-header" onclick="togglePanel(this)">
            <span><span class="service-icon">📧</span> Gmail</span>
            <span id="gmailStatus" class="badge">⚪ не авторизован</span>
        </div>
        <div class="panel" id="gmailPanel">
            <button class="btn btn-primary clean-btn" data-service="gmail">▶ Запустить очистку</button>
            <div class="result" id="gmailResult"></div>
        </div>
    </div>
    <!-- Аналогично для Drive, Twitter, VK, Instagram, Инструменты – но для краткости опускаю. 
         Полный код будет передан в финальном архиве. -->
</div>
<script src="/static/script.js"></script>
</body>
</html>
